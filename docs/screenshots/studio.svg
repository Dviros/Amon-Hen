<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Amon Hen Studio</title>
  <desc id="desc">A terminal studio with provider settings, agents, telemetry, and command logs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f251f"/>
      <stop offset="0.54" stop-color="#101312"/>
      <stop offset="1" stop-color="#16273a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="#f6f7f2"/>
  <path d="M0 0h1280v720H0z" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#f6f7f2" stroke-width="1">
    <path d="M80 0v720M160 0v720M240 0v720M320 0v720M400 0v720M480 0v720M560 0v720M640 0v720M720 0v720M800 0v720M880 0v720M960 0v720M1040 0v720M1120 0v720M1200 0v720"/>
    <path d="M0 80h1280M0 160h1280M0 240h1280M0 320h1280M0 400h1280M0 480h1280M0 560h1280M0 640h1280"/>
  </g>
  <rect x="78" y="66" width="1124" height="588" rx="18" fill="#fbfcf7" filter="url(#shadow)"/>
  <rect x="78" y="66" width="1124" height="56" rx="18" fill="#10251f"/>
  <path d="M78 104h1124v28H78z" fill="#10251f"/>
  <circle cx="112" cy="94" r="8" fill="#b7472a"/>
  <circle cx="140" cy="94" r="8" fill="#d8b45f"/>
  <circle cx="168" cy="94" r="8" fill="#2f7d69"/>
  <text x="208" y="101" fill="#f6f7f2" font-size="18" font-weight="800" class="mono">Amon Hen Studio</text>
  <text x="1016" y="101" fill="#d8b45f" font-size="15" font-weight="700" class="mono">ctrl+c twice to quit</text>

  <rect x="102" y="148" width="218" height="460" rx="10" fill="#f6f7f2" stroke="#10251f" stroke-width="2"/>
  <text x="124" y="182" fill="#587067" font-size="16" font-weight="800" class="mono">COMMANDS</text>
  <g class="mono" font-size="18" font-weight="700">
    <rect x="122" y="206" width="172" height="34" rx="7" fill="#d8b45f"/>
    <text x="138" y="229" fill="#10251f">Settings</text>
    <text x="138" y="274" fill="#30453e">Agents</text>
    <text x="138" y="316" fill="#30453e">Linear</text>
    <text x="138" y="358" fill="#30453e">Auth</text>
    <text x="138" y="400" fill="#30453e">Files</text>
    <text x="138" y="442" fill="#30453e">Tools</text>
    <text x="138" y="484" fill="#30453e">Help</text>
  </g>

  <rect x="348" y="148" width="430" height="460" rx="10" fill="#ffffff" stroke="#10251f" stroke-width="2"/>
  <text x="372" y="184" fill="#587067" font-size="16" font-weight="800" class="mono">PROVIDERS</text>
  <text x="610" y="184" fill="#2f7d69" font-size="15" font-weight="800" class="mono">handoff:on iterations:2</text>
