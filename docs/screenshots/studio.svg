    <rect x="460" y="332" width="86" height="28" rx="6" fill="#e6eefb"/><text x="474" y="352" fill="#254b93" font-size="14" font-weight="800">executor</text>
    <rect x="556" y="332" width="104" height="28" rx="6" fill="#e6eefb"/><text x="570" y="352" fill="#254b93" font-size="14" font-weight="800">gemini-pro</text>
    <rect x="670" y="332" width="58" height="28" rx="6" fill="#e6eefb"/><text x="684" y="352" fill="#254b93" font-size="14" font-weight="800">high</text>
  </g>
  <rect x="372" y="414" width="382" height="134" rx="8" fill="#101312"/>
  <text x="394" y="450" fill="#d8b45f" font-size="16" font-weight="800" class="mono">prompt</text>
  <text x="394" y="486" fill="#e8ede4" font-size="17" class="mono">deliver LINEAR-104 to review-or-ci</text>
  <text x="394" y="522" fill="#9fb2aa" font-size="15" class="mono">@src/lib.rs  $ cargo test --workspace</text>

  <rect x="806" y="148" width="372" height="460" rx="10" fill="#ffffff" stroke="#10251f" stroke-width="2"/>
  <text x="830" y="184" fill="#587067" font-size="16" font-weight="800" class="mono">TELEMETRY + TOOLS</text>
  <g class="mono" font-size="15" font-weight="700">
    <text x="830" y="232" fill="#30453e">codex</text><rect x="902" y="220" width="178" height="12" rx="6" fill="#dfe5dc"/><rect x="902" y="220" width="132" height="12" rx="6" fill="#2f7d69"/><text x="1094" y="233" fill="#587067">18k</text>
    <text x="830" y="278" fill="#30453e">claude</text><rect x="902" y="266" width="178" height="12" rx="6" fill="#dfe5dc"/><rect x="902" y="266" width="154" height="12" rx="6" fill="#b7472a"/><text x="1094" y="279" fill="#587067">24k</text>
    <text x="830" y="324" fill="#30453e">gemini</text><rect x="902" y="312" width="178" height="12" rx="6" fill="#dfe5dc"/><rect x="902" y="312" width="108" height="12" rx="6" fill="#315fb5"/><text x="1094" y="325" fill="#587067">13k</text>
  </g>
  <rect x="830" y="372" width="320" height="154" rx="8" fill="#101312"/>
  <text x="850" y="408" fill="#e8ede4" font-size="15" class="mono">$ git status --short</text>
  <text x="850" y="442" fill="#e8ede4" font-size="15" class="mono">$ cargo test --workspace</text>
  <text x="850" y="476" fill="#e8ede4" font-size="15" class="mono">Linear: comment + media attached</text>
</svg>
