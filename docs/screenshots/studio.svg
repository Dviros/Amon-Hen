    <rect x="524" y="274" width="72" height="28" rx="6" fill="#f7e7df"/><text x="538" y="294" fill="#7c331e" font-size="14" font-weight="800">sonnet</text>
    <rect x="606" y="274" width="52" height="28" rx="6" fill="#f7e7df"/><text x="620" y="294" fill="#7c331e" font-size="14" font-weight="800">max</text>
